name: gradle-ci

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Permissao do Maven Wrapper
        run: chmod +x mvnw
      - name: Build (simulando gradle com maven)
        run: ./mvnw -B clean verify
