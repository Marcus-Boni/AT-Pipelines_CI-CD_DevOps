name: secret-demo

on:
  workflow_dispatch:
  push:

jobs:
  secret-check:
    runs-on: ubuntu-latest
    steps:
      - name: Validar API_KEY
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          if [ -n "$API_KEY" ]; then
            echo "API_KEY configurado"
          else
            echo "API_KEY nao configurado"
            exit 1
          fi
